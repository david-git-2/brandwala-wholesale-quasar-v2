<!doctype html>
<html>
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8" />
    <meta name="description" content="<%= productDescription %>" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta
      name="viewport"
      content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>"
    />

    <link id="dynamic-favicon" rel="icon" type="image/svg+xml" href="favicon.ico" />

    <style>
      #app-splash {
        --splash-bg: #fbfaf7;
        --splash-surface: #ffffff;
        --splash-mid: #ede9fe;
        --splash-accent: #7c3aed;
        --splash-accent-rgb: 124 58 237;
        --splash-ink: #171412;
        --splash-muted: #736a61;
        --splash-glow: rgb(var(--splash-accent-rgb) / 0.35);
        --splash-blob-1: #c4b5fd;
        --splash-blob-3: #ddd6fe;
        --splash-gradient-end: #f3efff;
        --splash-accent-dark: #5b21b6;
        --splash-icon-tint: #faf8ff;

        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background: linear-gradient(
          165deg,
          var(--splash-surface) 0%,
          var(--splash-bg) 55%,
          var(--splash-gradient-end) 100%
        );
        color: var(--splash-ink);
        opacity: 1;
        transition: opacity 0.38s ease;
      }

      #app-splash.app-splash--hide {
        opacity: 0;
        pointer-events: none;
      }

      .app-splash__bg {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .app-splash__grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgb(23 20 18 / 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgb(23 20 18 / 0.04) 1px, transparent 1px);
        background-size: 52px 52px;
        mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 100%);
      }

      .app-splash__blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        animation: app-splash-blob 18s ease-in-out infinite alternate;
      }

      .app-splash__blob--1 {
        width: min(68vw, 560px);
        height: min(68vw, 560px);
        top: -18%;
        left: -12%;
        background: radial-gradient(circle, var(--splash-blob-1) 0%, transparent 68%);
        opacity: 0.45;
      }

      .app-splash__blob--2 {
        width: min(52vw, 420px);
        height: min(52vw, 420px);
        right: -10%;
        bottom: -12%;
        background: radial-gradient(circle, var(--splash-mid) 0%, transparent 70%);
        opacity: 0.85;
        animation-delay: -7s;
      }

      .app-splash__blob--3 {
        width: min(36vw, 280px);
        height: min(36vw, 280px);
        top: 38%;
        left: 58%;
        background: radial-gradient(circle, var(--splash-blob-3) 0%, transparent 70%);
        opacity: 0.55;
        animation-delay: -12s;
      }

      .app-splash__ghost {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -52%);
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        font-size: clamp(5.5rem, 18vw, 13rem);
        font-weight: 900;
        line-height: 0.85;
        letter-spacing: -0.06em;
        white-space: nowrap;
        color: transparent;
        -webkit-text-stroke: 1px rgb(var(--splash-accent-rgb) / 0.07);
        background: linear-gradient(
          160deg,
          rgb(var(--splash-accent-rgb) / 0.04) 0%,
          rgb(var(--splash-accent-rgb) / 0.08) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        user-select: none;
        pointer-events: none;
      }

      .app-splash__content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.35rem;
        padding: 2rem;
        animation: app-splash-rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .app-splash__icon-wrap {
        position: relative;
        width: 6.5rem;
        height: 6.5rem;
        display: grid;
        place-items: center;
      }

      .app-splash__ring {
        position: absolute;
        inset: 0;
        border-radius: 1.35rem;
        border: 1px solid rgb(var(--splash-accent-rgb) / 0.18);
        animation: app-splash-ring 2.8s ease-in-out infinite;
      }

      .app-splash__ring--2 {
        inset: -0.65rem;
        border-radius: 1.65rem;
        border-color: rgb(var(--splash-accent-rgb) / 0.08);
        animation-delay: -1.4s;
      }

      .app-splash__icon-card {
        position: relative;
        width: 5rem;
        height: 5rem;
        display: grid;
        place-items: center;
        border-radius: 1.15rem;
        background: linear-gradient(145deg, #ffffff, var(--splash-icon-tint));
        border: 1px solid rgb(var(--splash-accent-rgb) / 0.12);
        box-shadow:
          0 0 0 1px rgb(255 255 255 / 0.9),
          0 14px 40px rgb(var(--splash-accent-rgb) / 0.12),
          0 4px 16px rgb(23 20 18 / 0.06);
        animation: app-splash-pulse 3.2s ease-in-out infinite;
      }

      .app-splash__icon-card svg {
        width: 2.6rem;
        height: 2.6rem;
        filter: drop-shadow(0 4px 10px rgb(var(--splash-accent-rgb) / 0.2));
      }

      .app-splash__copy {
        text-align: center;
      }

      .app-splash__name {
        display: block;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        font-size: clamp(1.35rem, 3.8vw, 1.75rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        background: linear-gradient(
          120deg,
          var(--splash-ink) 0%,
          var(--splash-accent-dark) 55%,
          var(--splash-accent) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .app-splash__tagline {
        margin: 0.45rem 0 0;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        font-size: 0.82rem;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--splash-muted);
      }

      .app-splash__loader {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        margin-top: 0.35rem;
      }

      .app-splash__dot {
        width: 0.42rem;
        height: 0.42rem;
        border-radius: 50%;
        background: var(--splash-accent);
        box-shadow: 0 0 10px var(--splash-glow);
        animation: app-splash-dot 1.1s ease-in-out infinite;
      }

      .app-splash__dot:nth-child(2) {
        animation-delay: 0.15s;
      }

      .app-splash__dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes app-splash-blob {
        0% {
          transform: translate(0, 0) scale(1);
        }
        40% {
          transform: translate(36px, -42px) scale(1.06);
        }
        70% {
          transform: translate(-22px, 28px) scale(0.96);
        }
        100% {
          transform: translate(12px, -10px) scale(1.03);
        }
      }

      @keyframes app-splash-rise {
        from {
          opacity: 0;
          transform: translateY(18px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes app-splash-pulse {
        0%,
        100% {
          box-shadow:
            0 0 0 1px rgb(255 255 255 / 0.9),
            0 14px 40px rgb(var(--splash-accent-rgb) / 0.1),
            0 4px 16px rgb(23 20 18 / 0.05);
        }
        50% {
          box-shadow:
            0 0 0 1px rgb(255 255 255 / 1),
            0 18px 48px rgb(var(--splash-accent-rgb) / 0.18),
            0 6px 20px rgb(23 20 18 / 0.07);
        }
      }

      @keyframes app-splash-ring {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.55;
        }
        50% {
          transform: scale(1.06);
          opacity: 1;
        }
      }

      @keyframes app-splash-dot {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.35;
        }
        40% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" aria-hidden="true">
      <div class="app-splash__bg" aria-hidden="true">
        <div class="app-splash__blob app-splash__blob--1"></div>
        <div class="app-splash__blob app-splash__blob--2"></div>
        <div class="app-splash__blob app-splash__blob--3"></div>
        <div class="app-splash__grid"></div>
        <div class="app-splash__ghost" id="app-splash-ghost">Operations</div>
      </div>

      <div class="app-splash__content">
        <div class="app-splash__icon-wrap">
          <div class="app-splash__ring app-splash__ring--2" aria-hidden="true"></div>
          <div class="app-splash__ring" aria-hidden="true"></div>
          <div class="app-splash__icon-card" id="app-splash-icon"></div>
        </div>

        <div class="app-splash__copy">
          <span class="app-splash__name" id="app-splash-name">TradeFlowBD</span>
          <p class="app-splash__tagline" id="app-splash-tagline">Run your business</p>
        </div>

        <div class="app-splash__loader" aria-hidden="true">
          <span class="app-splash__dot"></span>
          <span class="app-splash__dot"></span>
          <span class="app-splash__dot"></span>
        </div>
      </div>
    </div>
    <script>
      (function initAppSplashTheme() {
        var AUTH_KEY = 'brandwala.auth.access.v4';
        var WORKSPACE_KEY = 'brandwala.tenant.workspace.v1';

        var SCOPE_THEMES = {
          platform: {
            accent: '#ef4444',
            accentRgb: '239 68 68',
            mid: '#fee2e2',
            blob1: '#fca5a5',
            blob3: '#fecaca',
            gradientEnd: '#fff5f5',
            accentDark: '#b91c1c',
            iconTint: '#fffafa',
            ghost: 'Platform',
            tagline: 'Govern the platform',
          },
          app: {
            accent: '#10b981',
            accentRgb: '16 185 129',
            mid: '#d1fae5',
            blob1: '#6ee7b7',
            blob3: '#a7f3d0',
            gradientEnd: '#f0fdf9',
            accentDark: '#047857',
            iconTint: '#f8fffc',
            ghost: 'Operations',
            tagline: 'Run your business',
          },
          shop: {
            accent: '#3b82f6',
            accentRgb: '59 130 246',
            mid: '#dbeafe',
            blob1: '#93c5fd',
            blob3: '#bfdbfe',
            gradientEnd: '#eff6ff',
            accentDark: '#1d4ed8',
            iconTint: '#f8fbff',
            ghost: 'Store',
            tagline: 'Your wholesale store',
          },
          investor: {
            accent: '#0f766e',
            accentRgb: '15 118 110',
            mid: '#ccfbf1',
            blob1: '#5eead4',
            blob3: '#99f6e4',
            gradientEnd: '#f0fdfa',
            accentDark: '#0f5f59',
            iconTint: '#f7fffe',
            ghost: 'Investor',
            tagline: 'Your portfolio',
          },
          default: {
            accent: '#7c3aed',
            accentRgb: '124 58 237',
            mid: '#ede9fe',
            blob1: '#c4b5fd',
            blob3: '#ddd6fe',
            gradientEnd: '#f3efff',
            accentDark: '#5b21b6',
            iconTint: '#faf8ff',
            ghost: 'Operations',
            tagline: 'Run your business',
          },
        };

        function readJson(key) {
          try {
            var raw = localStorage.getItem(key);
            return raw ? JSON.parse(raw) : null;
          } catch (error) {
            return null;
          }
        }

        function detectScopeFromPath(path) {
          if (/^\/platform(\/|$)/.test(path)) return 'platform';
          if (/\/investor(\/|$)/.test(path)) return 'investor';
          if (/\/(shop)(\/|$)/.test(path)) return 'shop';
          if (/\/(app)(\/|$)/.test(path)) return 'app';
          return null;
        }

        function resolveScope(path, auth) {
          return detectScopeFromPath(path) || (auth && auth.scope) || 'default';
        }

        function findTenantBySlug(tenants, slug) {
          if (!slug || !Array.isArray(tenants)) return null;
          for (var i = 0; i < tenants.length; i++) {
            if (tenants[i] && tenants[i].slug === slug) return tenants[i];
          }
          return null;
        }

        function findTenantById(tenants, id) {
          if (id == null || !Array.isArray(tenants)) return null;
          for (var i = 0; i < tenants.length; i++) {
            if (tenants[i] && tenants[i].id === id) return tenants[i];
          }
          return null;
        }

        function resolveTenantName(scope, auth, workspace, path) {
          var tenants = workspace && workspace.availableAdminTenants;
          var slugMatch = path.match(/^\/([^/]+)\/(app|shop|investor)/);
          var slugTenant = slugMatch ? findTenantBySlug(tenants, slugMatch[1]) : null;

          if (slugTenant && slugTenant.name) return slugTenant.name;

          if (scope === 'app' && workspace && workspace.selectedTenantId != null) {
            var selected = findTenantById(tenants, workspace.selectedTenantId);
            if (selected && selected.name) return selected.name;
          }

          if (scope === 'shop' && auth && auth.customerGroup && auth.customerGroup.name) {
            return auth.customerGroup.name;
          }

          if (auth && auth.tenant && auth.tenant.name) return auth.tenant.name;

          return null;
        }

        function buildIconMarkup(color) {
          return (
            '<svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
            '<rect width="28" height="28" rx="7" fill="' +
            color +
            '" fill-opacity="0.15" />' +
            '<path d="M7 9.5C7 8.12 8.12 7 9.5 7H14V14H7V9.5Z" fill="' +
            color +
            '" />' +
            '<path d="M14 7H18.5C19.88 7 21 8.12 21 9.5V14H14V7Z" fill="' +
            color +
            '" fill-opacity="0.7" />' +
            '<path d="M7 14H14V21H9.5C8.12 21 7 19.88 7 18.5V14Z" fill="' +
            color +
            '" fill-opacity="0.7" />' +
            '<path d="M14 14H21V18.5C21 19.88 19.88 21 18.5 21H14V14Z" fill="' +
            color +
            '" fill-opacity="0.45" />' +
            '</svg>'
          );
        }

        function buildFaviconHref(color) {
          var svg =
            '<svg width="32" height="32" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">' +
            '<rect width="28" height="28" rx="7" fill="' +
            color +
            '" fill-opacity="0.18"/>' +
            '<path d="M7 9.5C7 8.12 8.12 7 9.5 7H14V14H7V9.5Z" fill="' +
            color +
            '"/>' +
            '<path d="M14 7H18.5C19.88 7 21 8.12 21 9.5V14H14V7Z" fill="' +
            color +
            '" fill-opacity="0.7"/>' +
            '<path d="M7 14H14V21H9.5C8.12 21 7 19.88 7 18.5V14Z" fill="' +
            color +
            '" fill-opacity="0.7"/>' +
            '<path d="M14 14H21V18.5C21 19.88 19.88 21 18.5 21H14V14Z" fill="' +
            color +
            '" fill-opacity="0.45"/>' +
            '</svg>';
          return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
        }

        var splash = document.getElementById('app-splash');
        if (!splash) return;

        var path = window.location.pathname || '/';
        var auth = readJson(AUTH_KEY);
        var workspace = readJson(WORKSPACE_KEY);
        var scope = resolveScope(path, auth);
        var theme = SCOPE_THEMES[scope] || SCOPE_THEMES.default;
        var tenantName = resolveTenantName(scope, auth, workspace, path);

        splash.dataset.scope = scope;
        splash.style.setProperty('--splash-accent', theme.accent);
        splash.style.setProperty('--splash-accent-rgb', theme.accentRgb);
        splash.style.setProperty('--splash-mid', theme.mid);
        splash.style.setProperty('--splash-blob-1', theme.blob1);
        splash.style.setProperty('--splash-blob-3', theme.blob3);
        splash.style.setProperty('--splash-gradient-end', theme.gradientEnd);
        splash.style.setProperty('--splash-accent-dark', theme.accentDark);
        splash.style.setProperty('--splash-icon-tint', theme.iconTint);
        splash.style.setProperty('--splash-glow', 'rgb(' + theme.accentRgb + ' / 0.35)');

        var ghost = document.getElementById('app-splash-ghost');
        if (ghost) ghost.textContent = theme.ghost;

        var name = document.getElementById('app-splash-name');
        if (name) name.textContent = tenantName || 'TradeFlowBD';

        var tagline = document.getElementById('app-splash-tagline');
        if (tagline) tagline.textContent = theme.tagline;

        var icon = document.getElementById('app-splash-icon');
        if (icon) icon.innerHTML = buildIconMarkup(theme.accent);

        var favicon = document.getElementById('dynamic-favicon');
        if (favicon) {
          favicon.type = 'image/svg+xml';
          favicon.href = buildFaviconHref(theme.accent);
        }
      })();
    </script>
    <!-- quasar:entry-point -->
  </body>
</html>
